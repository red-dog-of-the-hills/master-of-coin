[[repos]]
repo = "builtin"
hooks = [
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = [
    "--fix=no",
  ] },
  { id = "trailing-whitespace", args = [
    "--markdown-linebreak-ext=md",
  ] },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.2"
hooks = [{ id = "ruff-check" }, { id = "ruff-format", args = ["--check"] }]
