[project]
name = "master-of-coin"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["fastapi[standard]>=0.132.0"]

[dependency-groups]
dev = [
  "black>=26.1.0",
  "prek>=0.3.3",
  "pytest>=9.0.2",
  "pytest-cov>=7.0.0",
  "pytest-sugar>=1.1.1",
  "ruff>=0.15.2",
  "rust-just>=1.46.0",
]

[tool.pytest.ini_options]
addopts = "-ra -v -W error"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["api"]
