runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.4"

    - name: Install the project
      run:  uv sync --locked --all-extras --dev
